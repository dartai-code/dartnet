<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7556351842925138"
     crossorigin="anonymous"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DartNet - Color Switch</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <meta name="theme-color" content="#0a0a1a">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; overflow: hidden; touch-action: none; }
    .cs-wrapper {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100vh; position: relative;
    }
    .cs-back {
      position: fixed; top: 12px; left: 12px; z-index: 20;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer;
      font-size: 14px; text-decoration: none; transition: background 0.2s;
    }
    .cs-back:hover { background: rgba(255,255,255,0.15); }
    .cs-container { position: relative; display: inline-block; border-radius: 12px; overflow: hidden; }
    #csCanvas { display: block; border-radius: 12px; }
    .cs-hud {
      position: absolute; top: 16px; left: 0; width: 100%; text-align: center;
      z-index: 5; pointer-events: none;
    }
    .cs-score {
      font-family: 'Orbitron', monospace; font-size: 48px; font-weight: 900;
      color: #fff; text-shadow: 0 0 30px rgba(255,255,255,0.3);
      transition: transform 0.15s; display: inline-block;
    }
    .cs-score.pop { transform: scale(1.3); }
    .cs-best { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 4px; }

    .cs-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: none; justify-content: center; align-items: center;
      z-index: 10; border-radius: 12px;
      background: rgba(10,10,30,0.85); backdrop-filter: blur(8px);
    }
    .cs-overlay.active { display: flex; }
    .cs-panel {
      text-align: center; padding: 40px 30px; animation: csSlide 0.4s ease-out;
    }
    @keyframes csSlide {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .cs-panel h1 {
      font-size: 36px; font-weight: 900; margin-bottom: 6px;
      background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
      background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .cs-panel h2 { color: #fff; font-size: 28px; margin-bottom: 8px; }
    .cs-panel .sub { color: #888; font-size: 14px; letter-spacing: 3px; margin-bottom: 30px; }
    .cs-panel .final-score {
      font-family: 'Orbitron', monospace; font-size: 56px; font-weight: 900;
      color: #ffd93d; margin: 10px 0; text-shadow: 0 0 30px rgba(255,217,61,0.4);
    }
    .cs-panel .stat { color: #aaa; font-size: 14px; margin: 4px 0; }
    .cs-btn {
      display: inline-block; padding: 14px 40px; font-size: 17px; font-weight: 700;
      border: none; border-radius: 50px; cursor: pointer; letter-spacing: 2px;
      transition: transform 0.2s, box-shadow 0.2s; text-transform: uppercase; margin: 6px;
    }
    .cs-btn:active { transform: scale(0.95); }
    .cs-btn-play {
      background: linear-gradient(135deg, #4d96ff, #6bcb77); color: #fff;
      box-shadow: 0 4px 25px rgba(77,150,255,0.4);
    }
    .cs-btn-retry {
      background: linear-gradient(135deg, #ff6b6b, #ffd93d); color: #1a1a2e;
      box-shadow: 0 4px 25px rgba(255,107,107,0.4);
    }
    .cs-btn-menu {
      background: transparent; color: #888; border: 1px solid #444;
      padding: 10px 30px; font-size: 14px; border-radius: 50px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="cs-wrapper">
    <a href="/games.html" class="cs-back"><i class="fas fa-arrow-left"></i> Games</a>
    <div class="cs-container" id="csContainer">
      <canvas id="csCanvas"></canvas>
      <div class="cs-hud" id="csHud" style="display:none;">
        <div class="cs-score" id="csScore">0</div>
        <div class="cs-best" id="csBest"></div>
      </div>
      <div class="cs-overlay active" id="csMenu">
        <div class="cs-panel">
          <h1>COLOR SWITCH</h1>
          <div class="sub">TAP TO JUMP</div>
          <button class="cs-btn cs-btn-play" onclick="CS.start()">PLAY</button>
        </div>
      </div>
      <div class="cs-overlay" id="csGameOver">
        <div class="cs-panel">
          <h2>GAME OVER</h2>
          <div class="final-score" id="csFinalScore">0</div>
          <div class="stat" id="csHighScore"></div>
          <div style="margin-top:20px">
            <button class="cs-btn cs-btn-retry" onclick="CS.start()">RETRY</button>
          </div>
          <button class="cs-btn cs-btn-menu" onclick="location.href='/games.html'">MENU</button>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script src="/js/color-switch.js"></script>
  <script>
    if (!requireAuth()) throw 'auth';
    CS.init();
  </script>
</body>
</html>
