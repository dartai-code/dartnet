<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DartNet - Play. Earn. Win.</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/images/logo.jpeg">
  <meta name="theme-color" content="#0a0a1a">
  <meta name="description" content="DartNet - Gaming & Reward Platform. Play games, complete tasks, earn points, and win exciting rewards!">
</head>
<body>
  <div class="auth-container" style="flex-direction: column; gap: 40px; text-align: center;">
    <div>
      <img src="/images/logo.jpeg" alt="DartNet" style="width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--accent); box-shadow: 0 0 40px rgba(0, 255, 136, 0.3);">
      <h1 style="font-family: Orbitron, sans-serif; font-size: 42px; color: var(--accent); margin-top: 20px; text-shadow: 0 0 20px rgba(0, 255, 136, 0.4);">DARTNET</h1>
      <p style="color: var(--text-secondary); font-size: 18px; margin-top: 8px;">Play. Earn. Win.</p>
    </div>

    <div style="max-width: 500px;">
      <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 30px;">
        <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px;">
          <i class="fas fa-gamepad" style="font-size: 28px; color: var(--accent2); margin-bottom: 8px;"></i>
          <h3 style="font-size: 14px;">Play Games</h3>
          <p style="font-size: 12px; color: var(--text-dim);">Fun mini games to earn</p>
        </div>
        <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px;">
          <i class="fas fa-dharmachakra" style="font-size: 28px; color: var(--accent); margin-bottom: 8px;"></i>
          <h3 style="font-size: 14px;">Spin & Win</h3>
          <p style="font-size: 12px; color: var(--text-dim);">Daily spins for rewards</p>
        </div>
        <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px;">
          <i class="fas fa-tasks" style="font-size: 28px; color: var(--accent3); margin-bottom: 8px;"></i>
          <h3 style="font-size: 14px;">Complete Tasks</h3>
          <p style="font-size: 12px; color: var(--text-dim);">Easy points from tasks</p>
        </div>
        <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px;">
          <i class="fas fa-trophy" style="font-size: 28px; color: var(--warning); margin-bottom: 8px;"></i>
          <h3 style="font-size: 14px;">Win Rewards</h3>
          <p style="font-size: 12px; color: var(--text-dim);">Climb the leaderboard</p>
        </div>
      </div>

      <div style="display: flex; gap: 12px; justify-content: center;">
        <a href="/login.html" class="btn btn-primary" style="width: auto; padding: 14px 40px;">
          <i class="fas fa-sign-in-alt"></i> Login
        </a>
        <a href="/register.html" class="btn btn-secondary" style="width: auto; padding: 14px 40px;">
          <i class="fas fa-user-plus"></i> Sign Up
        </a>
      </div>
    </div>

    <p style="color: var(--text-dim); font-size: 12px; margin-top: 20px;">
      &copy; 2026 DartNet. All rights reserved.<br>
      <a href="/about.html" style="color: var(--text-secondary); text-decoration: underline;">About Us</a> &middot;
      <a href="/privacy.html" style="color: var(--text-secondary); text-decoration: underline;">Privacy Policy</a>
    </p>
  </div>

  <script src="/js/app.js"></script>
  <script>
    // Redirect if already logged in
    if (getToken()) {
      const u = getUser();
      window.location.href = u && u.is_admin ? '/admin.html' : '/dashboard.html';
    }
  </script>
</body>
</html>
