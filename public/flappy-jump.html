<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7556351842925138"
     crossorigin="anonymous"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DartNet - Flappy Jump</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <meta name="theme-color" content="#0a0a1a">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; overflow: hidden; touch-action: none; }
    .fj-wrapper {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100vh; position: relative;
    }
    .fj-back {
      position: fixed; top: 12px; left: 12px; z-index: 20;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer;
      font-size: 14px; text-decoration: none; transition: background 0.2s;
    }
    .fj-back:hover { background: rgba(255,255,255,0.15); }
    .fj-container { position: relative; display: inline-block; border-radius: 12px; overflow: hidden; }
    #fjCanvas { display: block; border-radius: 12px; }
    .fj-hud {
      position: absolute; top: 20px; left: 0; width: 100%; text-align: center;
      z-index: 5; pointer-events: none;
    }
    .fj-score {
      font-family: 'Orbitron', monospace; font-size: 52px; font-weight: 900;
      color: #fff; text-shadow: 0 2px 20px rgba(0,0,0,0.5);
      transition: transform 0.15s; display: inline-block;
    }
    .fj-score.pop { transform: scale(1.25); }

    .fj-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: none; justify-content: center; align-items: center;
      z-index: 10; border-radius: 12px;
      background: rgba(10,10,30,0.85); backdrop-filter: blur(8px);
    }
    .fj-overlay.active { display: flex; }
    .fj-panel { text-align: center; padding: 40px 30px; animation: fjSlide 0.4s ease-out; }
    @keyframes fjSlide {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .fj-panel h1 {
      font-size: 38px; font-weight: 900; margin-bottom: 6px;
      background: linear-gradient(135deg, #ffd93d, #ff6b6b, #4d96ff);
      background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .fj-panel h2 { color: #fff; font-size: 28px; margin-bottom: 8px; }
    .fj-panel .sub { color: #888; font-size: 14px; letter-spacing: 3px; margin-bottom: 24px; }
    .fj-panel .final-score {
      font-family: 'Orbitron', monospace; font-size: 56px; font-weight: 900;
      color: #ffd93d; margin: 10px 0; text-shadow: 0 0 30px rgba(255,217,61,0.4);
    }
    .fj-panel .stat { color: #aaa; font-size: 14px; margin: 4px 0; }
    .fj-btn {
      display: inline-block; padding: 14px 40px; font-size: 17px; font-weight: 700;
      border: none; border-radius: 50px; cursor: pointer; letter-spacing: 2px;
      transition: transform 0.2s, box-shadow 0.2s; text-transform: uppercase; margin: 6px;
    }
    .fj-btn:active { transform: scale(0.95); }
    .fj-btn-play {
      background: linear-gradient(135deg, #ffd93d, #ff6b6b); color: #1a1a2e;
      box-shadow: 0 4px 25px rgba(255,217,61,0.4);
    }
    .fj-btn-menu {
      background: transparent; color: #888; border: 1px solid #444;
      padding: 10px 30px; font-size: 14px; border-radius: 50px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="fj-wrapper">
    <a href="/games.html" class="fj-back"><i class="fas fa-arrow-left"></i> Games</a>
    <div class="fj-container" id="fjContainer">
      <canvas id="fjCanvas"></canvas>
      <div class="fj-hud" id="fjHud" style="display:none;">
        <div class="fj-score" id="fjScore">0</div>
      </div>
      <div class="fj-overlay active" id="fjMenu">
        <div class="fj-panel">
          <h1>FLAPPY JUMP</h1>
          <div class="sub">TAP TO FLY</div>
          <button class="fj-btn fj-btn-play" onclick="FJ.start()">PLAY</button>
        </div>
      </div>
      <div class="fj-overlay" id="fjGameOver">
        <div class="fj-panel">
          <h2>GAME OVER</h2>
          <div class="final-score" id="fjFinalScore">0</div>
          <div class="stat" id="fjBestScore"></div>
          <div style="margin-top:20px;">
            <button class="fj-btn fj-btn-play" onclick="FJ.start()">RETRY</button>
          </div>
          <button class="fj-btn fj-btn-menu" onclick="location.href='/games.html'">MENU</button>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script src="/js/flappy-jump.js"></script>
  <script>
    if (!requireAuth()) throw 'auth';
    FJ.init();
  </script>
</body>
</html>
