<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DartNet - Admin Panel</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <meta name="theme-color" content="#0a0a1a">
</head>
<body>
  <button class="mobile-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">
    <i class="fas fa-bars"></i>
  </button>

  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="/images/logo.jpeg" alt="DartNet">
        <h2>ADMIN</h2>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item active" href="#" onclick="showTab('dashboard')"><i class="fas fa-chart-pie"></i> Dashboard</a>
        <a class="nav-item" href="#" onclick="showTab('users')"><i class="fas fa-users"></i> Users</a>
        <a class="nav-item" href="#" onclick="showTab('tasks')"><i class="fas fa-tasks"></i> Tasks</a>
        <a class="nav-item" href="#" onclick="showTab('withdrawals')"><i class="fas fa-money-bill-wave"></i> Withdrawals</a>
        <hr style="border-color: var(--border); margin: 8px 12px;">
        <a class="nav-item" href="/dashboard.html"><i class="fas fa-arrow-left"></i> User Dashboard</a>
        <a class="nav-item" href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" style="background: var(--danger)">A</div>
          <div class="user-details">
            <div class="name">Admin</div>
            <div class="level" style="color: var(--danger)">Administrator</div>
          </div>
        </div>
      </div>
    </aside>

    <main class="main-content">

      <!-- DASHBOARD TAB -->
      <div id="tab-dashboard">
        <div class="page-header">
          <h1><i class="fas fa-chart-pie"></i> Admin Dashboard</h1>
          <p>Platform overview and statistics.</p>
        </div>
        <div class="stats-grid" id="adminStats">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- USERS TAB -->
      <div id="tab-users" style="display:none">
        <div class="page-header">
          <h1><i class="fas fa-users"></i> User Management</h1>
        </div>
        <div class="card">
          <div class="flex-between mb-2">
            <input type="text" id="userSearch" placeholder="Search users..." style="background:var(--bg-secondary);border:1px solid var(--border);color:#fff;padding:8px 14px;border-radius:8px;width:250px;" oninput="loadUsers()">
          </div>
          <div id="usersTable">
            <div class="loading"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

      <!-- TASKS TAB -->
      <div id="tab-tasks" style="display:none">
        <div class="page-header flex-between">
          <div>
            <h1><i class="fas fa-tasks"></i> Task Management</h1>
          </div>
          <button class="btn btn-primary btn-small" onclick="showAddTask()">
            <i class="fas fa-plus"></i> Add Task
          </button>
        </div>
        <div class="card">
          <div id="adminTasksTable">
            <div class="loading"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

      <!-- WITHDRAWALS TAB -->
      <div id="tab-withdrawals" style="display:none">
        <div class="page-header">
          <h1><i class="fas fa-money-bill-wave"></i> Withdrawal Requests</h1>
        </div>
        <div style="margin-bottom: 16px; display: flex; gap: 8px;">
          <button class="btn btn-small btn-primary" onclick="loadWithdrawals('pending')">Pending</button>
          <button class="btn btn-small btn-secondary" onclick="loadWithdrawals('approved')">Approved</button>
          <button class="btn btn-small btn-secondary" onclick="loadWithdrawals('rejected')">Rejected</button>
        </div>
        <div class="card">
          <div id="withdrawTable">
            <div class="loading"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Add Task Modal -->
  <div class="modal-overlay" id="taskModal">
    <div class="modal">
      <h2 id="taskModalTitle">Add Task</h2>
      <form id="taskForm">
        <input type="hidden" id="editTaskId">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="tTitle" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="tDesc" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label>Reward Points</label>
          <input type="number" id="tReward" min="1" required>
        </div>
        <div class="form-group">
          <label>Task Link</label>
          <input type="url" id="tLink" placeholder="https://...">
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="tType">
            <option value="visit">Visit Website</option>
            <option value="watch">Watch Video</option>
            <option value="install">Install App</option>
            <option value="play">Play Game</option>
          </select>
        </div>
        <div class="form-group">
          <label>Timer (seconds)</label>
          <input type="number" id="tTimer" value="30" min="5">
        </div>
        <div style="display:flex;gap:10px">
          <button type="submit" class="btn btn-primary btn-small">Save</button>
          <button type="button" class="btn btn-secondary btn-small" onclick="document.getElementById('taskModal').classList.remove('active')">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (!requireAuth()) throw 'auth';
    // Admin check done by API, but quick client-side guard
    const u = getUser();
    if (!u || !u.is_admin) {
      window.location.href = '/dashboard.html';
      throw 'not admin';
    }

    function showTab(tab) {
      document.querySelectorAll('[id^="tab-"]').forEach(el => el.style.display = 'none');
      document.getElementById(`tab-${tab}`).style.display = 'block';
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      event.currentTarget.classList.add('active');

      switch (tab) {
        case 'dashboard': loadAdminStats(); break;
        case 'users': loadUsers(); break;
        case 'tasks': loadAdminTasks(); break;
        case 'withdrawals': loadWithdrawals('pending'); break;
      }
    }

    // ======================== STATS ========================
    async function loadAdminStats() {
      try {
        const data = await api('/api/admin/stats');
        if (!data) return;

        document.getElementById('adminStats').innerHTML = `
          <div class="stat-card">
            <div class="stat-icon" style="color:var(--accent)"><i class="fas fa-users"></i></div>
            <div class="stat-value">${data.totalUsers}</div>
            <div class="stat-label">Total Users</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="color:var(--accent3)"><i class="fas fa-signal"></i></div>
            <div class="stat-value">${data.dailyActive}</div>
            <div class="stat-label">Daily Active</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="color:var(--warning)"><i class="fas fa-coins"></i></div>
            <div class="stat-value">${formatPoints(data.totalRewards)}</div>
            <div class="stat-label">Total Rewards Given</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="color:var(--danger)"><i class="fas fa-clock"></i></div>
            <div class="stat-value">${data.pendingWithdrawals}</div>
            <div class="stat-label">Pending Withdrawals</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="color:var(--accent2)"><i class="fas fa-dharmachakra"></i></div>
            <div class="stat-value">${data.totalSpins}</div>
            <div class="stat-label">Total Spins</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="color:var(--accent)"><i class="fas fa-tasks"></i></div>
            <div class="stat-value">${data.totalTasks}</div>
            <div class="stat-label">Active Tasks</div>
          </div>
        `;
      } catch (err) {
        console.error(err);
      }
    }

    // ======================== USERS ========================
    async function loadUsers() {
      try {
        const search = document.getElementById('userSearch')?.value || '';
        const data = await api(`/api/admin/users?search=${encodeURIComponent(search)}`);
        if (!data) return;

        const el = document.getElementById('usersTable');
        if (data.users.length === 0) {
          el.innerHTML = '<p class="text-dim text-center">No users found.</p>';
          return;
        }

        el.innerHTML = `
          <div style="overflow-x:auto">
          <table class="data-table">
            <thead><tr>
              <th>ID</th><th>Username</th><th>Email</th><th>Points</th><th>Level</th><th>Streak</th><th>Status</th><th>Actions</th>
            </tr></thead>
            <tbody>
              ${data.users.map(u => `
                <tr>
                  <td>${u.user_id}</td>
                  <td>${esc(u.username)}</td>
                  <td>${esc(u.email)}</td>
                  <td>${formatPoints(u.wallet_points)}</td>
                  <td>${u.level}</td>
                  <td>${u.daily_streak}</td>
                  <td>${u.is_banned ? '<span class="badge badge-banned">Banned</span>' : '<span class="badge badge-active">Active</span>'}</td>
                  <td>
                    ${u.is_banned
                      ? `<button class="btn btn-small btn-primary" onclick="unbanUser(${u.user_id})">Unban</button>`
                      : `<button class="btn btn-small btn-danger" onclick="banUser(${u.user_id})">Ban</button>`
                    }
                    <button class="btn btn-small btn-secondary" onclick="adjustPoints(${u.user_id}, '${esc(u.username)}')">Adjust</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          </div>
          <p class="text-dim mt-1">Showing ${data.users.length} of ${data.total} users (page ${data.page}/${data.totalPages})</p>
        `;
      } catch (err) {
        console.error(err);
      }
    }

    async function banUser(id) {
      if (!confirm('Ban this user?')) return;
      await api(`/api/admin/users/${id}/ban`, { method: 'POST' });
      showToast('User banned.', 'success');
      loadUsers();
    }

    async function unbanUser(id) {
      await api(`/api/admin/users/${id}/unban`, { method: 'POST' });
      showToast('User unbanned.', 'success');
      loadUsers();
    }

    function adjustPoints(userId, username) {
      const amount = prompt(`Adjust points for ${username}. Enter positive (add) or negative (deduct) number:`);
      if (!amount) return;
      const reason = prompt('Reason:');
      if (!reason) return;

      api(`/api/admin/users/${userId}/adjust-points`, {
        method: 'POST',
        body: JSON.stringify({ amount: parseInt(amount), reason })
      }).then(() => {
        showToast('Points adjusted.', 'success');
        loadUsers();
      });
    }

    // ======================== TASKS ========================
    async function loadAdminTasks() {
      try {
        const tasks = await api('/api/admin/tasks');
        if (!tasks) return;

        const el = document.getElementById('adminTasksTable');
        el.innerHTML = `
          <div style="overflow-x:auto">
          <table class="data-table">
            <thead><tr>
              <th>ID</th><th>Title</th><th>Reward</th><th>Type</th><th>Timer</th><th>Active</th><th>Actions</th>
            </tr></thead>
            <tbody>
              ${tasks.map(t => `
                <tr>
                  <td>${t.task_id}</td>
                  <td>${esc(t.task_title)}</td>
                  <td>${t.reward_points} pts</td>
                  <td>${t.task_type || '—'}</td>
                  <td>${t.timer_seconds}s</td>
                  <td>${t.is_active ? '<span class="badge badge-active">Yes</span>' : '<span class="badge badge-banned">No</span>'}</td>
                  <td>
                    <button class="btn btn-small btn-secondary" onclick='editTask(${JSON.stringify(t)})'>Edit</button>
                    <button class="btn btn-small btn-danger" onclick="deleteTask(${t.task_id})">Delete</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          </div>
        `;
      } catch (err) {
        console.error(err);
      }
    }

    function showAddTask() {
      document.getElementById('taskModalTitle').textContent = 'Add Task';
      document.getElementById('editTaskId').value = '';
      document.getElementById('taskForm').reset();
      document.getElementById('taskModal').classList.add('active');
    }

    function editTask(t) {
      document.getElementById('taskModalTitle').textContent = 'Edit Task';
      document.getElementById('editTaskId').value = t.task_id;
      document.getElementById('tTitle').value = t.task_title;
      document.getElementById('tDesc').value = t.task_description;
      document.getElementById('tReward').value = t.reward_points;
      document.getElementById('tLink').value = t.task_link;
      document.getElementById('tType').value = t.task_type;
      document.getElementById('tTimer').value = t.timer_seconds;
      document.getElementById('taskModal').classList.add('active');
    }

    document.getElementById('taskForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('editTaskId').value;
      const body = {
        task_title: document.getElementById('tTitle').value,
        task_description: document.getElementById('tDesc').value,
        reward_points: document.getElementById('tReward').value,
        task_link: document.getElementById('tLink').value,
        task_type: document.getElementById('tType').value,
        verification_type: 'timer',
        timer_seconds: document.getElementById('tTimer').value,
        is_active: true
      };

      try {
        if (id) {
          await api(`/api/admin/tasks/${id}`, { method: 'PUT', body: JSON.stringify(body) });
        } else {
          await api('/api/admin/tasks', { method: 'POST', body: JSON.stringify(body) });
        }
        document.getElementById('taskModal').classList.remove('active');
        showToast('Task saved!', 'success');
        loadAdminTasks();
      } catch (err) { /* handled */ }
    });

    async function deleteTask(id) {
      if (!confirm('Delete this task?')) return;
      await api(`/api/admin/tasks/${id}`, { method: 'DELETE' });
      showToast('Task deleted.', 'success');
      loadAdminTasks();
    }

    // ======================== WITHDRAWALS ========================
    async function loadWithdrawals(status) {
      try {
        const data = await api(`/api/admin/withdrawals?status=${status}`);
        if (!data) return;

        const el = document.getElementById('withdrawTable');
        if (data.length === 0) {
          el.innerHTML = `<p class="text-dim text-center">No ${status} withdrawals.</p>`;
          return;
        }

        el.innerHTML = `
          <div style="overflow-x:auto">
          <table class="data-table">
            <thead><tr>
              <th>ID</th><th>User</th><th>Amount</th><th>Method</th><th>Details</th><th>Date</th>
              ${status === 'pending' ? '<th>Actions</th>' : ''}
            </tr></thead>
            <tbody>
              ${data.map(w => `
                <tr>
                  <td>${w.id}</td>
                  <td>${esc(w.username)}</td>
                  <td>${formatPoints(w.amount)} ($${(w.amount/1000).toFixed(2)})</td>
                  <td>${w.method.toUpperCase()}</td>
                  <td>${esc(w.account_details)}</td>
                  <td>${formatDate(w.created_at)}</td>
                  ${status === 'pending' ? `
                    <td>
                      <button class="btn btn-small btn-primary" onclick="approveWithdraw(${w.id})">Approve</button>
                      <button class="btn btn-small btn-danger" onclick="rejectWithdraw(${w.id})">Reject</button>
                    </td>
                  ` : ''}
                </tr>
              `).join('')}
            </tbody>
          </table>
          </div>
        `;
      } catch (err) {
        console.error(err);
      }
    }

    async function approveWithdraw(id) {
      if (!confirm('Approve this withdrawal?')) return;
      await api(`/api/admin/withdrawals/${id}/approve`, { method: 'POST' });
      showToast('Withdrawal approved!', 'success');
      loadWithdrawals('pending');
    }

    async function rejectWithdraw(id) {
      const note = prompt('Rejection reason:');
      if (!note) return;
      await api(`/api/admin/withdrawals/${id}/reject`, { method: 'POST', body: JSON.stringify({ note }) });
      showToast('Withdrawal rejected. Points refunded.', 'success');
      loadWithdrawals('pending');
    }

    // Utility
    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    // Init
    loadAdminStats();
  </script>
</body>
</html>
