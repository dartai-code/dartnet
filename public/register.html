<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DartNet - Sign Up</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/images/logo.jpeg">
  <meta name="theme-color" content="#0a0a1a">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-logo">
        <img src="/images/logo.jpeg" alt="DartNet">
        <h1>DARTNET</h1>
        <p>Create your account</p>
      </div>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <form id="registerForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Choose a username" minlength="3" maxlength="20" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="you@email.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Min 6 characters" minlength="6" required>
        </div>
        <div class="form-group">
          <label>Referral Code (optional)</label>
          <input type="text" id="referralCode" placeholder="Enter referral code">
        </div>
        <button type="submit" class="btn btn-primary" id="registerBtn">
          Create Account
        </button>
      </form>

      <div class="auth-link">
        Already have an account? <a href="/login.html">Log In</a>
      </div>
      <div class="auth-link" style="margin-top: 8px; font-size: 12px;">
        By signing up, you agree to our <a href="/privacy.html">Privacy Policy</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (getToken()) window.location.href = '/dashboard.html';

    // Pre-fill referral from URL
    const params = new URLSearchParams(window.location.search);
    if (params.get('ref')) {
      document.getElementById('referralCode').value = params.get('ref');
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      const errEl = document.getElementById('errorMsg');
      const sucEl = document.getElementById('successMsg');
      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const referralCode = document.getElementById('referralCode').value.trim();

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const data = await api('/api/auth/register', {
          method: 'POST',
          body: JSON.stringify({ username, email, password, referralCode })
        });

        setToken(data.token);
        setUser(data.user);
        window.location.href = '/dashboard.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
